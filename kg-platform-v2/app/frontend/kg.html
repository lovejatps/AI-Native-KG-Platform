<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>知识图谱列表</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        table {border-collapse: collapse; width: 100%;}
        th, td {border: 1px solid #ddd; padding: 8px; text-align: left;}
        th {background-color: #f2f2f2;}
        .actions button {margin-right: 5px;}
        #addKgBtn {float: right; margin-bottom: 1rem;}
        /* Modal styles */
        .modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
        .modal-content {background:#fff; margin:10% auto; padding:20px; width:320px; border-radius:4px;}
        .modal-content h3 {margin-top:0;}
        .modal-content label {display:block; margin-top:10px;}
        .modal-content input, .modal-content textarea {width:100%; margin-top:5px;}
    </style>
</head>
<script>
// Dayjs CDN 回退与 extend 容错
if (typeof dayjs === "undefined") {
    window.dayjs = function () { return { format: function () { return ""; } }; };
}
if (dayjs && typeof dayjs.extend === "undefined") { dayjs.extend = function () {}; }
// 屏蔽 chrome-extension 资源请求（无效占位）
const originalCreateElement = document.createElement;
document.createElement = function (tag) {
    const el = originalCreateElement.call(document, tag);
    if (tag.toLowerCase() === "script") {
        const setAttr = el.setAttribute;
        el.setAttribute = function (name, value) {
            if (name === "src" && value && value.startsWith("chrome-extension://")) { return; }
            return setAttr.call(this, name, value);
        };
    }
    return el;
};
</script>
<body>
    <nav style="margin-bottom:1rem;">
        <a href="/kg_page">知识图谱列表</a> |
        <a href="/chat">Chat</a> |
        <a href="/datasources_page">数据源管理</a> | 
        <a href="/semantic_page">语义词典</a>
    </nav>
    <h1>知识图谱</h1>

    <button id="addKgBtn">新增知识图谱</button>
    <!-- Add KG Modal -->
    <div id="addKgModal" class="modal">
        <div class="modal-content">
            <h3>新增知识图谱</h3>
            <label for="kgNameInput">图谱名称</label>
            <input type="text" id="kgNameInput" placeholder="必填" />
            <label for="kgDescInput">描述</label>
            <textarea id="kgDescInput" rows="3" placeholder="可选"></textarea>
            <div style="margin-top:10px; text-align:right;">
                <button onclick="closeAddKgModal()">取消</button>
                <button onclick="submitAddKg()">创建</button>
            </div>
        </div>
    </div>
    <table id="kgTable">
        <thead>
            <tr>
                <th>序号</th>
                <th>名称</th>
                <th>对象数量</th>
                <th>关系数量</th>
                <th>描述</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        async function loadKGs(){
            const resp = await fetch('/kg/list');
            const data = await resp.json();
            const tbody = document.querySelector('#kgTable tbody');
            tbody.innerHTML = '';
            data.kgs.forEach((kg, idx)=>{
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx+1}</td>
                    <td>${kg.name}</td>
                    <td>${kg.entity_count || 0}</td>
                    <td>${kg.relation_count || 0}</td>
                    <td>${kg.description || ''}</td>
                    <td class="actions">
                        <button onclick="viewKG('${kg.id}', event)">查看</button>
                        <button onclick="exportKG('${kg.id}')">导出</button>
                        <button onclick="importDocs('${kg.id}')">导入文档</button>
                        <button onclick="openSchemaManagement('${kg.id}')">Schema管理</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
        async function viewKG(id, evt){
            // Directly open KG 详情页（包含图、对象、关系三标签）
            if (!id) {
                alert('KG ID 缺失，无法查看详情');
                if (evt && evt.target) evt.target.disabled = true;
                return;
            }
            window.location.href = `/kg_detail?kg_id=${id}`;
        }
        function importDocs(id){
            // 跳转到上传页面，传递 kg_id
            window.location.href = `/upload?kg_id=${id}`;
        }

        async function exportKG(id){
            if(!id){alert('缺少 KG ID');return;}
            const resp = await fetch(`/kg/${id}`);
            if(!resp.ok){alert('获取 KG 数据失败');return;}
            const data = await resp.json();
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kg_${id}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        // addKG function removed; modal UI is used for creating a KG
        function openIntegration(kgId){
    window.location.href = `/kg_integration_page?kg_id=${kgId}`;
}

function openSchemaManagement(kgId){
    // 跳转到 Schema 管理页面（目前使用同一接入页面）
    window.location.href = `/kg_integration_page?kg_id=${kgId}`;
}

document.getElementById('addKgBtn').addEventListener('click', showAddKgModal);
function showAddKgModal(){ document.getElementById('addKgModal').style.display='block'; }
function closeAddKgModal(){ document.getElementById('addKgModal').style.display='none'; }
async function submitAddKg(){
    const name = document.getElementById('kgNameInput').value.trim();
    if(!name){ alert('名称为必填项'); return; }
    const description = document.getElementById('kgDescInput').value;
    const resp = await fetch('/kg/create', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, description})
    });
    if(resp.ok){
        closeAddKgModal();
        await loadKGs();
    } else {
        const err = await resp.json();
        alert('创建失败: ' + (err.detail || err.message));
    }
}
        // Initial load
        loadKGs();
    </script>
</body>
</html>
