<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - KG Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="w-full max-w-sm bg-white p-6 rounded shadow" x-data="loginForm()">
    <h2 class="text-2xl font-bold mb-4 text-center">Sign In</h2>
    <form @submit.prevent="login()">
      <div class="mb-4">
        <label class="block text-gray-700">Email</label>
        <input type="email" x-model="email" required class="w-full border px-3 py-2 rounded" />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700">Password</label>
        <input type="password" x-model="password" required class="w-full border px-3 py-2 rounded" />
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">
        Login
      </button>
    </form>
    <p class="mt-4 text-center text-sm">
      <a href="/register" class="text-blue-500">Create an account</a>
    </p>
  </div>

  <script>
    function loginForm() {
      return {
        email: '',
        password: '',
        async login() {
          const resp = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: this.email, password: this.password }),
          });
          const data = await resp.json();
          if (resp.ok) {
            localStorage.setItem('access_token', data.access_token);
            // redirect to UI
            window.location.href = '/ui';
          } else {
            alert(data.detail || 'Login failed');
          }
        },
      };
    }
  </script>
</body>
</html>
