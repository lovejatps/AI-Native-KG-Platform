if (typeof dayjs === "undefined") { window.dayjs = function(){ return { format:function(){return ""; } }; }; }
if (dayjs && typeof dayjs.extend === "undefined") { dayjs.extend = function(){}; }
// 阻止 chrome-extension 资源加载
const originalCreateElement = document.createElement;
document.createElement = function(tag){
  const el = originalCreateElement.call(document, tag);
  if(tag.toLowerCase()==="script"){
    const setAttr = el.setAttribute;
    el.setAttribute = function(name,value){
      if(name==="src" && value && value.startsWith("chrome-extension://")) return;
      return setAttr.call(this,name,value);
    };
  }
  return el;
};

<script>
let globalHierarchy = {};
function systemChange(e){
  const sys = e.target.value;
  const libSelect = document.querySelector('select[name="library"]');
  libSelect.innerHTML='';
  const libs = globalHierarchy[sys] ? Object.keys(globalHierarchy[sys].libraries) : [];
  libs.forEach(v=>{ const opt=document.createElement('option'); opt.value=v; opt.textContent=v; libSelect.appendChild(opt); });
  libSelect.dispatchEvent(new Event('change'));
}
function libraryChange(e){
  const sys = document.querySelector('select[name="library_name"]').value;
  const lib = e.target.value;
  const tblSelect = document.querySelector('select[name="table_name"]');
  tblSelect.innerHTML='';
  const tables = globalHierarchy[sys]?.libraries[lib]?.tables ? Object.keys(globalHierarchy[sys].libraries[lib].tables) : [];
  tables.forEach(v=>{ const opt=document.createElement('option'); opt.value=v; opt.textContent=v; tblSelect.appendChild(opt); });
  tblSelect.dispatchEvent(new Event('change'));
}
function tableChange(e){
  const sys = document.querySelector('select[name="library_name"]').value;
  const lib = document.querySelector('select[name="library"]').value;
  const tbl = e.target.value;
  const colSelect = document.querySelector('select[name="column_name"]');
  colSelect.innerHTML='';
  const cols = globalHierarchy[sys]?.libraries[lib]?.tables[tbl]?.columns || [];
  cols.forEach(v=>{ const opt=document.createElement('option'); opt.value=v; opt.textContent=v; colSelect.appendChild(opt); });
}
function showModal(title, fields, onSubmit){
  document.getElementById('modalTitle').textContent=title;
  const container=document.getElementById('formFields');
  container.innerHTML='';
  fields.forEach(f=>{
    const label=document.createElement('label');
    label.textContent=f.label;
    let input;
    if (f.type==='select') {
      input=document.createElement('select');
      (f.options||[]).forEach(opt=>{
        const o=document.createElement('option');
        o.value=opt.value;
        o.textContent=opt.label;
        if (opt.selected) o.selected=true;
        input.appendChild(o);
      });
    } else {
      input=f.type==='textarea'?document.createElement('textarea'):document.createElement('input');
    }
    input.name=f.name;
    if(f.required) input.required=true;
    if(f.placeholder) input.placeholder=f.placeholder;
    if(f.value!==undefined) input.value=f.value;
    // 对 select 进行回显后触发 change，确保级联下拉同步
    if(f.type==='select' && f.value!==undefined){
      setTimeout(()=>{input.dispatchEvent(new Event('change'));},0);
    }
    if(f.type==='textarea'){input.rows=2;}
    if (typeof f.onChange === 'function') {
      input.addEventListener('change', f.onChange);
    }
    label.appendChild(input);
    container.appendChild(label);
  });
  const form=document.getElementById('modalForm');
  form.onsubmit=function(e){
    e.preventDefault();
    const data={};
    fields.forEach(f=>{data[f.name]=form.elements[f.name].value;});
    onSubmit(data);
  };
  document.getElementById('modal').style.display='block';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

function loadFields(){
  fetch('/semantic/fields?limit=1000')
    .then(r=>r.json())
    .then(d=>{
      const tbody=document.querySelector('#fieldTable tbody');
      tbody.innerHTML='';
      d.items.forEach(item=>{
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${item.id}</td><td>${item.library_name||''}</td><td>${item.table_name}</td><td>${item.column_name}</td><td>${(item.synonyms||[]).join(', ')}</td><td>${item.description||''}</td><td class="actions"><button data-id="${item.id}" class="editField">编辑</button><button data-id="${item.id}" class="delField">删除</button></td>`;
        tbody.appendChild(tr);
      });
      document.querySelectorAll('.editField').forEach(btn=>btn.onclick=()=>editField(btn.dataset.id));
      document.querySelectorAll('.delField').forEach(btn=>btn.onclick=()=>deleteField(btn.dataset.id));
    });
}
function addField(){
  // Build cascading options from datasources and their schemas
  fetch('/datasources')
    .then(r=>r.json())
    .then(dsData=>{
      const dsList = dsData.datasources || [];
      const hierarchy = {};
      const promises = dsList.map(ds=>
        fetch(`/datasources/${ds.id}/schema`)
          .then(r=>r.json())
          .then(schema=>{
            const sys = ds.system_name || '';
            const lib = ds.database || '';
            hierarchy[sys] = hierarchy[sys] || { libraries: {} };
            const libObj = hierarchy[sys].libraries[lib] = hierarchy[sys].libraries[lib] || { tables: {} };
            schema.tables.forEach(tbl=>{
              const tblObj = libObj.tables[tbl.name] = libObj.tables[tbl.name] || { columns: [] };
              tbl.columns.forEach(col=>{ tblObj.columns.push(col.name); });
            });
          })
      );
      Promise.all(promises).then(()=>{globalHierarchy = hierarchy;
        // Prepare initial system options
        const systemOpts = Object.keys(hierarchy).map(v=>({value:v,label:v}));

            {name:'library_name',label:'系统',type:'select',options:systemOpts, onChange:systemChange, required:true},

        if(sysSelect && sysSelect.options.length>0){
            sysSelect.value = sysSelect.options[0].value;
            sysSelect.dispatchEvent(new Event('change'));

                const libObj = hierarchy[sys].libraries[lib] = hierarchy[sys].libraries[lib] || { tables: {} };
                schema.tables.forEach(tbl=>{
                  const tblObj = libObj.tables[tbl.name] = libObj.tables[tbl.name] || { columns: [] };
                  tbl.columns.forEach(col=>{ tblObj.columns.push(col.name); });
                });
              })
          );
          Promise.all(promises).then(()=>{globalHierarchy = hierarchy;
            // Determine library that contains the table
            const sysName = item.library_name||'';
            let libName='';
            if (hierarchy[sysName]) {
              const libs = Object.keys(hierarchy[sysName].libraries);
              libName = libs.find(l=> hierarchy[sysName].libraries[l].tables && hierarchy[sysName].libraries[l].tables[item.table_name]) || (libs[0]||'');
            }
            const fields = [
              {name:'library_name',label:'系统',type:'select',options:Object.keys(hierarchy).map(v=>({value:v,label:v})), value:item.library_name||'', onChange:systemChange, required:true},
              {name:'library',label:'库名',type:'select',options:[], value:libName , onChange:libraryChange, required:true},
              {name:'table_name',label:'表名',type:'select',options:[], value:item.table_name, onChange:tableChange, required:true},
              {name:'column_name',label:'字段名',type:'select',options:[], value:item.column_name, required:true},
              {name:'display_value',label:'展示值',value:item.display_value,required:true},
              {name:'actual_value',label:'实际值',value:item.actual_value,required:true},
              {name:'synonyms',label:'同义词(JSON数组)',value:JSON.stringify(item.synonyms||[]),required:false}
            ];
            showModal('编辑值映射',fields,data=>{
              if(data.synonyms){try{data.synonyms=JSON.parse(data.synonyms)}catch(e){alert('同义词需JSON数组');return;}}
              // 必填校验
              if(!data.library_name || !data.library || !data.table_name || !data.column_name){
                alert('系统、库名、表名、字段名均为必填项');
                return;
              }
              fetch(`/semantic/values/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
                .then(r=>{if(r.ok){closeModal();loadValues();}else r.json().then(e=>{ const msg = Array.isArray(e.detail) ? e.detail.map(d=>d.msg||d).join('\n') : JSON.stringify(e.detail); alert(msg || '失败'); });});
            });
            // Auto-select cascade for edit
            setTimeout(()=>{
                const sysSelect=document.querySelector('select[name="library_name"]');
                if(sysSelect){
                    sysSelect.value = item.library_name;
                    sysSelect.dispatchEvent(new Event('change'));
                }
                setTimeout(()=>{
                    const libSelect=document.querySelector('select[name="library"]');
                    const sys=item.library_name;
                    const libs = hierarchy[sys] ? Object.keys(hierarchy[sys].libraries) : [];
                    const targetLib = libs.find(l=> hierarchy[sys].libraries[l].tables && hierarchy[sys].libraries[l].tables[item.table_name]);
                    if(targetLib){
                        libSelect.value = targetLib;
                        libSelect.dispatchEvent(new Event('change'));
                    } else if(libs.length>0){
                        libSelect.value = libs[0];
                        libSelect.dispatchEvent(new Event('change'));
                    }
                    setTimeout(()=>{
                        const tblSelect=document.querySelector('select[name="table_name"]');
                        tblSelect.value = item.table_name;
                        tblSelect.dispatchEvent(new Event('change'));
                        setTimeout(()=>{
                            const colSelect=document.querySelector('select[name="column_name"]');
                            colSelect.value = item.column_name;
                        },0);
                    },0);
                },0);
            },0);
          });
        });
    });
}
function deleteValue(id){
  if(!confirm('确定删除？')) return;
  fetch(`/semantic/values/${id}`,{method:'DELETE'}).then(r=>{if(r.ok)loadValues();else alert('删除失败');});
}
document.getElementById('addValueBtn').onclick=addValue;
// initial load
loadFields();
loadValues();
</script>
