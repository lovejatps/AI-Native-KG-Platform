<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>模型图谱编辑</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@antv/x6@latest/dist/x6.css" />
  <style>
    .modal {z-index: 10000;}
    .modal-content {z-index: 10001;}

    body {font-family: Arial, sans-serif; margin:0; height:100vh; display:flex; flex-direction:column;}
    .toolbar {padding:8px; background:#f5f5f5; display:flex; gap:8px;}
    #graphContainer {flex:1; background:#fff;}
    .modal {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); overflow:auto;}
    .modal-content {background:#fff; margin:5% auto; padding:20px; width:90%; max-width:500px; border-radius:4px;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@antv/x6@latest/dist/x6.min.js"></script>
</head>
<body>
  <!-- 原始字段映射弹窗 -->
<div id="fieldMapModal" class="modal">
  <div class="modal-content">
    <h3>映射原始字段</h3>
    <label>系统: <select id="fieldSystem" required></select></label><br><br>
    <label>数据库: <select id="fieldDatabase" required></select></label><br><br>
    <label>表: <select id="fieldTable" required></select></label><br><br>
    <label>属性: <select id="fieldColumn" required></select></label><br><br>
    <button onclick="confirmFieldMap()">确定</button>
    <button onclick="closeFieldMapModal()">取消</button>
  </div>
</div>
  <!-- 顶部栏（关键控制区） -->
  <div style="padding:8px; background:#f5f5f5; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd;">
    <div>数据源：<span id="dataSourceInfo">车队系统</span> | Schema版本：<span id="schemaVersionInfo">v1.2</span></div>
    <div>
      <button onclick="saveGraph()">保存</button>
      <button onclick="publishModel()">发布</button>
      <button onclick="rollbackModel()">回滚</button>
    </div>
  </div>

  <div class="toolbar" style="padding:8px; background:#fafafa; border-bottom:1px solid #ddd;">

    <button onclick="createEntity()">+ 新建实体</button>
    <button onclick="openAddEdgeModal()">+ 关系</button>
    <button onclick="closeEditor()">关闭</button>
  </div>

<!-- 关系弹窗 -->
<div id="edgeModal" class="modal">
  <div class="modal-content">
    <h3>新增关系</h3>
    <label>关系名称: <input type="text" id="relName" required></label><br><br>
    <label>来源实体: <select id="relSource" required></select></label><br><br>
    <label>目标实体: <select id="relTarget" required></select></label><br><br>
    <button onclick="confirmAddEdge()">确定</button>
    <button onclick="closeEdgeModal()">取消</button>
  </div>
</div>

<!-- 编辑关系弹窗 -->
<div id="editEdgeModal" class="modal">
  <div class="modal-content">
    <h3>编辑关系名称</h3>
    <label>关系名称: <input type="text" id="editEdgeName" required></label><br><br>
    <button onclick="confirmEditEdge()">确定</button>
    <button onclick="closeEditEdgeModal()">取消</button>
  </div>
</div>

  <div style="display:flex; height:calc(100% - 80px);">
    <!-- 左侧实体列表（Entity Panel） -->
    <div id="entityPanel" style="width:200px; border-right:1px solid #ddd; padding:8px; overflow:auto;">
      <h3>实体列表</h3>
      
      <ul id="entityList" style="list-style:none; padding:0; margin-top:8px;">
        <!-- 动态填充 -->
      </ul>
    </div>
    <!-- 中间图谱编辑区（核心） -->
    <div id="graphContainer" style="flex:1; position:relative; background:#fafafa;">
    </div>
    <!-- 右侧属性编辑面板（Property Panel） -->
    <div id="propertyPanel" style="width:250px; border-left:1px solid #ddd; padding:8px; overflow:auto; display:none;">
      <h3>属性编辑</h3>
      <div id="propContent"></div>
      <button style="margin-top:8px;" onclick="addProperty()">+ 新增属性</button>
    </div>
  </div>

  <!-- 底部 Diff & 日志 -->
  <div style="padding:8px; background:#f9f9f9; border-top:1px solid #ddd; height:120px; overflow:auto;">
    <h4>Diff & 日志</h4>
    <pre id="diffPanel" style="margin:0; white-space:pre-wrap; word-break:break-all;">暂无变更</pre>
  </div>

  <script>
    // ---------------------------------------------------------------
    // 读取 URL 参数 (kg_id, model_id)
    // ---------------------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const kgId = params.get('kg_id');
    const modelId = params.get('model_id');
    if (!kgId || !modelId) {
      alert('缺少必要的参数');
    }

    // ---------------------------------------------------------------
    // 初始化 X6 Graph
    // ---------------------------------------------------------------
    const { Graph } = X6;
    const graph = new Graph({
      container: document.getElementById('graphContainer'),
      grid: true,
      connecting: {
        router: 'manhattan',
        connector: 'rounded',
        anchor: 'center',
        connectionPoint: 'anchor',
        allowBlank: false,
        snap: true,
      },
      interacting: { nodeMovable: true, edgeMovable: true },
    });

    // ---------- 边交互 ----------
    let selectedEdge = null;
    // 选中边并打开编辑弹窗
    graph.on('edge:click', ({ edge }) => {
      selectedEdge = edge;
      const currentName = (edge.getLabels && edge.getLabels()[0] && edge.getLabels()[0].attrs && edge.getLabels()[0].attrs.label && edge.getLabels()[0].attrs.label.text) || '';
      document.getElementById('editEdgeName').value = currentName;
      document.getElementById('editEdgeModal').style.display = 'block';
    });
    // 右键删除确认
    graph.on('edge:contextmenu', ({ e, edge }) => {
      e.preventDefault();
      if (confirm('确认删除此关系吗？')) {
        graph.removeEdge(edge);
      }
    });
    // 确认编辑关系名称
    function confirmEditEdge() {
      if (!selectedEdge) return;
      const newName = document.getElementById('editEdgeName').value.trim();
      if (newName) {
        // 获取源目标节点
        const srcNode = selectedEdge.getSourceCell ? selectedEdge.getSourceCell() : null;
        const tgtNode = selectedEdge.getTargetCell ? selectedEdge.getTargetCell() : null;
        // 移除旧边并添加新边，保持相同连线，仅更改标签文本
        if (srcNode && tgtNode) {
          graph.removeEdge(selectedEdge);
          graph.addEdge({
            source: srcNode,
            target: tgtNode,
            labels: [{ attrs: { label: { text: newName } } }],
          });
        }
      }
      closeEditEdgeModal();
    }
    function closeEditEdgeModal() {
      document.getElementById('editEdgeModal').style.display = 'none';
      selectedEdge = null;
    }



    // ---------------------------------------------------------------
    // UI 操作：新增实体、关系
    // ---------------------------------------------------------------
    function addNode() {
      const name = prompt('请输入实体名称');
      if (!name) return;
      const cnt = graph.getNodes().length;
      graph.addNode({
        x: 50 + (cnt % 4) * 200,
        y: 50 + Math.floor(cnt / 4) * 150,
        width: 150,
        height: 80,
        label: name,
        attrs: { body: { stroke: '#5F95FF', fill: '#EFF4FF' } },
      });
    }

function openAddEdgeModal() {

  const sourceSelect = document.getElementById('relSource');
  const targetSelect = document.getElementById('relTarget');
  sourceSelect.innerHTML = '';
  targetSelect.innerHTML = '';
  const entities = Object.keys(entityProps);
  entities.forEach(name => {
    const opt1 = document.createElement('option');
    opt1.value = name;
    opt1.textContent = name;
    sourceSelect.appendChild(opt1);
    const opt2 = document.createElement('option');
    opt2.value = name;
    opt2.textContent = name;
    targetSelect.appendChild(opt2);

  document.getElementById('relName').value = '';
  document.getElementById('relSource').selectedIndex = 0;

}

function closeEdgeModal() {
  document.getElementById('edgeModal').style.display = 'none';
}

// ---------- 原始字段映射 ----------
// Real data source integration – fetch systems, databases, tables, columns from backend
let datasourceList = [];
let availableSystems = [];
let systemDatabases = {};
let dsIdMap = {}; // key: `${system}|${database}` => datasource id
let databaseTables = {};
let tableColumns = {};
let fieldMapContext = {entity: null, idx: null};

async function loadDataSources() {
  try {
    const resp = await fetch('/datasources');
    const data = await resp.json();
    datasourceList = data.datasources || [];
    // Build system & database mappings
    const systemSet = new Set();
    datasourceList.forEach(ds => {
      const sys = ds.system_name || ds.id;
      const db = ds.database || '';
      systemSet.add(sys);
      if (!systemDatabases[sys]) systemDatabases[sys] = [];
      if (db && !systemDatabases[sys].includes(db)) systemDatabases[sys].push(db);
      dsIdMap[`${sys}|${db}`] = ds.id;
    });
    availableSystems = Array.from(systemSet);
  } catch (e) {
    console.error('Failed to load datasources', e);
    alert('无法加载数据源列表');
  }
}

async function loadSchemaForDatasource(dsId) {
  try {
    const resp = await fetch(`/datasources/${dsId}/schema`);
    const schema = await resp.json();
    // schema: { database: <>, tables: [{name, columns: [{name, type, comment}...] }...] }
    const tables = schema.tables || [];
    databaseTables = {};
    tableColumns = {};
    tables.forEach(t => {
      const tName = t.name;
      databaseTables[tName] = [];
        t.columns.forEach(col => {
          const cName = col.name;
          // 完整路径：system|database|table|column（用于属性映射）
const sysElem = document.getElementById('fieldSystem');
            const dbElem = document.getElementById('fieldDatabase');
            const sys = sysElem ? sysElem.value : '';
            const db = dbElem ? dbElem.value : '';
          const fullPath = `${sys}|${db}|${tName}|${cName}`;
          // 表下拉仍使用列名列表（保持 UI 预期）
          databaseTables[tName].push(cName);
          // 记录列的完整路径，供属性映射使用
          tableColumns[fullPath] = {name: cName, type: col.type, comment: col.comment, system: sys, database: db, table: tName};
        });
    });
  } catch (e) {
    console.error('Failed to load schema', e);
    alert('获取表结构失败');
  }
}

async function openMapFieldModal(entity, idx) {
  fieldMapContext = {entity, idx};
  // Ensure data sources are loaded
  if (availableSystems.length === 0) await loadDataSources();
  const sysSelect = document.getElementById('fieldSystem');
  const dbSelect = document.getElementById('fieldDatabase');
  const tblSelect = document.getElementById('fieldTable');
  const colSelect = document.getElementById('fieldColumn');
  // Clear previous options
  sysSelect.innerHTML = '';
  dbSelect.innerHTML = '';
  tblSelect.innerHTML = '';
  colSelect.innerHTML = '';
  // Populate systems
  availableSystems.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sysSelect.appendChild(opt);
  });
  // System change -> load databases
  sysSelect.onchange = async () => {
    const sys = sysSelect.value;
    const dbs = systemDatabases[sys] || [];
    dbSelect.innerHTML = '';
    dbs.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      dbSelect.appendChild(opt);
    });
    if (dbs.length) dbSelect.dispatchEvent(new Event('change'));
  };
  // Database change -> load tables (schema)
  dbSelect.onchange = async () => {
    const sys = sysSelect.value;
    const db = dbSelect.value;
    const dsId = dsIdMap[`${sys}|${db}`];
    if (!dsId) {
      alert('未找到对应的数据源');
      return;
    }
    await loadSchemaForDatasource(dsId);
    // Populate tables
    tblSelect.innerHTML = '';
    Object.keys(databaseTables).forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      tblSelect.appendChild(opt);
    });
    if (Object.keys(databaseTables).length) tblSelect.dispatchEvent(new Event('change'));
  };
  // Table change -> populate columns
  tblSelect.onchange = () => {
    const t = tblSelect.value;
    const cols = databaseTables[t] || [];
    colSelect.innerHTML = '';
    cols.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      colSelect.appendChild(opt);
    });
  };
  // Initialize first level
  if (availableSystems.length) sysSelect.dispatchEvent(new Event('change'));
  // Show modal
  document.getElementById('fieldMapModal').style.display = 'block';
}

function closeFieldMapModal() {
  document.getElementById('fieldMapModal').style.display = 'none';
}

function confirmFieldMap() {
  const system = document.getElementById('fieldSystem').value;
  const database = document.getElementById('fieldDatabase').value;
  const table = document.getElementById('fieldTable').value;
  const column = document.getElementById('fieldColumn').value;
  if (!system || !database || !table || !column) {
    alert('请选择系统、数据库、表和属性');
    return;
  }
  const fullPath = `${system}|${database}|${table}|${column}`;
  const {entity, idx} = fieldMapContext;
  if (entity && typeof idx === 'number') {
    entityProps[entity][idx].origField = fullPath;
    showPropertyPanel(entity);
  }
  closeFieldMapModal();
}

function confirmAddEdge() {
  const name = document.getElementById('relName').value.trim();
  const src = document.getElementById('relSource').value;
  const tgt = document.getElementById('relTarget').value;
  if (!name || !src || !tgt) {
    alert('请完整填写关系名称、来源实体和目标实体');
    return;
  }
  const srcNode = graph.getNodes().find(n => n.getLabel() === src);
  const tgtNode = graph.getNodes().find(n => n.getLabel() === tgt);
  if (!srcNode || !tgtNode) {
    alert('未找到对应的实体节点');
    return;
  }
  graph.addEdge({
    source: srcNode,
    target: tgtNode,
    labels: [{ attrs: { label: { text: name } } }],
  });
  closeEdgeModal();
}

function closeEditor() {
      window.close();
    }

    // ---------------------------------------------------------------
    // ---------- 实体/属性面板相关数据结构 & 方法 -------------------
    // ---------------------------------------------------------------
let originalSchema = null;   // 用于 diff 计算
      let entityProps = {};          // {entityName: [{origField, semantic, type, visible}] 
      let entitySemanticNames = {}; // {entityName: semanticName}
      // 新增：记录实体关联的数据源（系统-数据库-表）
      let entityDataSources = {};   // {entityName: {system, database, table}}
      let currentEntity = null;     // 当前选中的实体名称

    // 从后端加载的 schema 同时初始化属性映射并渲染实体列表
function initFromSchema(schema) {
       originalSchema = JSON.parse(JSON.stringify(schema)); // 深拷贝留作 diff
       const entities = schema.entities || [];
       const relations = schema.relations || [];

       // 初始化属性映射
       entityProps = {};
       entities.forEach(e => {
         const props = (e.properties || []).map(p => ({
           origField: p.source_column || p.name,
           semantic: p.name,
           type: p.type || 'string',
           visible: true,
         }));
         entityProps[e.name] = props;
         // 恢复 semanticName
         let semanticName = e.name;
         if (e.metadata && typeof e.metadata.semanticName === 'string') {
           semanticName = e.metadata.semanticName;
         }
         entitySemanticNames[e.name] = semanticName;
       });
       renderEntityList();
     }

    // 渲染左侧实体列表
    function renderEntityList() {
      const ul = document.getElementById('entityList');
      ul.innerHTML = '';
      Object.keys(entityProps).forEach(name => {
const li = document.createElement('li');
          li.style.cursor = 'pointer';
          li.style.padding = '4px 0';
          li.textContent = name;
          li.draggable = false; // Prevent default drag behavior
          li.onclick = () => selectEntityFromList(name);
          ul.appendChild(li);
      });
    }

    // 兼容旧调用：点击 “+ 新建实体” 时打开完整的新增实体弹窗
    function createEntity(){
        openAddEntityModal();
    }
    // ------------------------------------------------------------
    // 新增实体弹窗相关函数（系统/数据库/表三层下拉）
    // ------------------------------------------------------------
    /** 打开新增实体弹窗 */
    async function openAddEntityModal() {
        // 清空语义输入框
        document.getElementById('newEntitySemantic').value = '';
        // 直接展示弹窗，无需加载系统/数据库/表信息
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('addEntityModal').style.display = 'block';
    }
    /** 关闭新增实体弹窗 */
    function closeAddEntityModal() {
        document.getElementById('addEntityModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }
    /** 确认新增实体 */
    function confirmAddEntity() {
        const semanticInput = document.getElementById('newEntitySemantic').value.trim();
        // 使用语义名称或自动生成的唯一名称作为实体标识
        const name = semanticInput || `Entity_${Date.now()}`;
        if (entityProps[name]) { alert('实体已存在'); return; }
        const semantic = semanticInput || name; // 语义名称若未填写则使用生成的名称
        // 创建节点
        const cnt = graph.getNodes().length;
        const node = graph.addNode({
            x: 50 + (cnt % 4) * 200,
            y: 50 + Math.floor(cnt / 4) * 150,
            width: 150,
            height: 80,
            label: name,
            attrs: { body: { stroke: '#5F95FF', fill: '#EFF4FF' } },
        });
        // 初始化空属性列表
        entityProps[name] = [];
        // 设置语义名称
        entitySemanticNames[name] = semantic;
        renderEntityList();
        closeAddEntityModal();
    }
    // 通过左侧列表点击选中实体并在画布上高亮
    function selectEntityFromList(name) {
      const node = graph.getNodes().find(n => n.getLabel() === name);
      if (node) {
        graph.centerContent();
        graph.select(node);
        showPropertyPanel(name);
      }
    }

    // 节点点击事件 - 打开属性面板
    graph.on('node:click', ({ node }) => {
      const name = node.getLabel();
      showPropertyPanel(name);
    });
    // Prevent default drag-and-drop creation on graph container
    const graphContainerElem = document.getElementById('graphContainer');
    graphContainerElem.addEventListener('dragover', e => e.preventDefault());
    graphContainerElem.addEventListener('drop', e => e.preventDefault());

    // 显示属性编辑面板 & 渲染属性表单
    function showPropertyPanel(name) {
      currentEntity = name;
      const panel = document.getElementById('propertyPanel');
      const container = document.getElementById('propContent');
      panel.style.display = 'block';
      const props = entityProps[name] || [];
      let html = `<h4>${name}</h4>`;
        // 实体语义名称输入框（默认与实体名称相同）
        const entitySemantic = entitySemanticNames[name] || name;
        html += `<div style="margin:8px 0;">
          实体语义名称：
          <input type="text" id="entitySemantic-${name}" value="${entitySemantic}" 
                 style="width:200px;" onchange="updateEntitySemantic('${name}', this.value)" />
        </div>`;
      html += `<table style="width:100%; border-collapse:collapse;">
                <tr><th>原始字段</th><th>语义名</th><th>类型</th><th>展示</th><th>操作</th></tr>`;
      props.forEach((p, idx) => {
        html += `<tr data-idx="${idx}">
                  <td><input style="width:90%;" value="${p.origField}" readonly/><button onclick="openMapFieldModal('${name}', ${idx})" style="margin-left:4px;">+</button></td>
                  <td><input style="width:90%;" value="${p.semantic}" onchange="updateProp('${name}', ${idx}, 'semantic', this.value)"/></td>
                  <td><select onchange="updateProp('${name}', ${idx}, 'type', this.value)">
                        <option value="string" ${p.type==='string'?'selected':''}>string</option>
                        <option value="int" ${p.type==='int'?'selected':''}>int</option>
                     </select></td>
                  <td style="text-align:center;"><input type="checkbox" ${p.visible?'checked':''} onchange="updateProp('${name}', ${idx}, 'visible', this.checked)"/></td>
                  <td><button onclick="removeProperty('${name}', ${idx})">🗑</button></td>
                </tr>`;
      });
      html += `</table>`;
      container.innerHTML = html;
    }

    // 更新属性对象
    function updateProp(entity, idx, field, value) {
      const arr = entityProps[entity];
      if (!arr) return;
      const prop = arr[idx];
      if (field === 'visible') prop[field] = !!value;
      else prop[field] = value;
    }

    // 更新实体语义名称（全局映射）
    function updateEntitySemantic(entity, newSemantic) {
      if (!entity) return;
      entitySemanticNames[entity] = newSemantic;
    }

    // 删除属性行
    function removeProperty(entity, idx) {
      const arr = entityProps[entity];
      if (!arr) return;
      arr.splice(idx, 1);
      showPropertyPanel(entity);
    }

    // 新增属性（空行）
    function addProperty() {
      if (!currentEntity) { alert('请选择实体'); return; }
      const arr = entityProps[currentEntity];
      arr.push({ origField: '', semantic: '', type: 'string', visible: true });
      showPropertyPanel(currentEntity);
    }

    // ---------------------------------------------------------------
    // 保存时使用 entityProps 而不是空属性数组，并生成 Diff
    // ---------------------------------------------------------------
    function generateDiff(oldSchema, newSchema) {
      const diffLines = [];
      const oldEnt = oldSchema.entities.map(e => e.name);
      const newEnt = newSchema.entities.map(e => e.name);
      // 实体新增/删除
      newEnt.filter(e => !oldEnt.includes(e)).forEach(e => diffLines.push(`+ 新增实体：${e}`));
      oldEnt.filter(e => !newEnt.includes(e)).forEach(e => diffLines.push(`- 删除实体：${e}`));
      // 属性改动（仅展示新增/删除属性）
      newSchema.entities.forEach(ne => {
        const oe = oldSchema.entities.find(o => o.name === ne.name);
        if (!oe) return; // 已是新增实体，已记录
        const oldProps = (oe.properties || []).map(p => p.name);
        const newProps = (ne.properties || []).map(p => p.name);
        newProps.filter(p => !oldProps.includes(p)).forEach(p => diffLines.push(`+ 实体 ${ne.name} 新增属性：${p}`));
        oldProps.filter(p => !newProps.includes(p)).forEach(p => diffLines.push(`- 实体 ${ne.name} 删除属性：${p}`));
      });
      // 关系变化
      const oldRel = (oldSchema.relations || []).map(r => `${r.source}->${r.target}:${r.type}`);
      const newRel = (newSchema.relations || []).map(r => `${r.source}->${r.target}:${r.type}`);
      newRel.filter(r => !oldRel.includes(r)).forEach(r => diffLines.push(`+ 新增关系：${r}`));
      oldRel.filter(r => !newRel.includes(r)).forEach(r => diffLines.push(`- 删除关系：${r}`));
      return diffLines.join('\n') || '暂无变更';
    }

    // 重写 saveGraph，使用 entityProps 并显示 Diff
    function saveGraph() {
      const nodes = graph.getNodes();
      const edges = graph.getEdges();
      // 组装 entities
const entities = nodes.map(node => {
      const props = entityProps[node.getLabel()] || [];
      // Convert internal property representation to backend schema format
      const schemaProps = props.map(p => ({
        // Use semantic name if provided; otherwise fall back to original field.
        name: p.semantic || p.origField,
        type: p.type || 'string',
        source_column: p.origField,
      }));
return {
                     name: node.getLabel(),
                     properties: schemaProps,
// Preserve semantic name (metadata.semanticName) for entity UI
                    metadata: {
                       semanticName: entitySemanticNames[node.getLabel()] || node.getLabel()
                     },
                   };
    });
// DEBUG: log edges before extracting relations
          console.log('Saving: edges from graph', edges);
          const relations = edges.map(edge => {
            // Extract source/target labels with comprehensive fallback
            let srcLabel = '';
            let tgtLabel = '';
            try {
              // 1. New X6 API
              const srcCell = edge.getSourceCell?.();
              const tgtCell = edge.getTargetCell?.();
              if (srcCell && typeof srcCell.getLabel === 'function') {
                srcLabel = srcCell.getLabel();
              } else if (edge.source && typeof edge.source.getLabel === 'function') {
                srcLabel = edge.source.getLabel();
              } else if (edge.source && typeof edge.source === 'string') {
                const node = graph.getCell(edge.source);
                if (node && typeof node.getLabel === 'function') srcLabel = node.getLabel();
              }

              if (tgtCell && typeof tgtCell.getLabel === 'function') {
                tgtLabel = tgtCell.getLabel();
              } else if (edge.target && typeof edge.target.getLabel === 'function') {
                tgtLabel = edge.target.getLabel();
              } else if (edge.target && typeof edge.target === 'string') {
                const node = graph.getCell(edge.target);
                if (node && typeof node.getLabel === 'function') tgtLabel = node.getLabel();
              }
            } catch (e) {
              // ignore
            }
            return {
              source: srcLabel,
              target: tgtLabel,
              type: edge.getLabels()[0]?.attrs?.label?.text || '',
            };
          });
      const newSchema = { entities, relations };

      // 计算 diff 并展示在底部
      const diffText = generateDiff(originalSchema || {entities: [], relations: []}, newSchema);
      document.getElementById('diffPanel').textContent = diffText;

      console.log('Saving schema to backend', newSchema);
      fetch(`/kg/${kgId}/models/${modelId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ schema: newSchema }),
      })
        .then(r => {
          if (r.ok) {
            alert('保存成功');
            if (window.opener && window.opener.loadModels) {
              window.opener.loadModels();
            }
            // 更新 originalSchema 为最新，以便后续 diff 正确
            originalSchema = JSON.parse(JSON.stringify(newSchema));
          } else {
            r.json().then(e => alert('保存失败: ' + e.error));
          }
        })
        .catch(err => alert('网络错误: ' + err));
    }

    // ---------------------------------------------------------------
    // 新增实体弹窗（动态创建）
    // ---------------------------------------------------------------
    // Modal overlay
    const modalOverlayDiv = document.createElement('div');
    modalOverlayDiv.id = 'modalOverlay';
    modalOverlayDiv.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:999';
    document.body.appendChild(modalOverlayDiv);
    // Modal container
    const modalDiv = document.createElement('div');
    modalDiv.id = 'addEntityModal';
    modalDiv.style.cssText = 'display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#fff;padding:20px;border:1px solid #ccc;z-index:1000;max-width:400px;box-shadow:0 2px 8px rgba(0,0,0,0.2)';
modalDiv.innerHTML = `
        <h3>新增实体</h3>
        <div style=\"margin:8px 0;\">实体语义名称：<input id=\"newEntitySemantic\" type=\"text\" style=\"width:200px;\"/></div>
        <button onclick=\"confirmAddEntity()\">确定</button>
        <button onclick=\"closeAddEntityModal()\">取消</button>
    `;
    document.body.appendChild(modalDiv);

    // 发布、回滚占位函数（后端未实现，先提示）
    function publishModel() { alert('发布功能待实现'); }
    function rollbackModel() { alert('回滚功能待实现'); }

    // ---------------------------------------------------------------
    // 初始化：加载模型后填充属性映射并渲染实体列表
    // ---------------------------------------------------------------
if (!window.__graphSchemaLoaded) {
  window.__graphSchemaLoaded = true;
  fetch(`/kg/${kgId}/models/${modelId}`)
      .then(r => r.json())
      .then(data => {
        const schema = data.schema || {};
         // 清空画布并初始化属性
         graph.clearCells();
         initFromSchema(schema);
        const entities = schema.entities || [];
        const relations = schema.relations || [];
        const nodeMap = {};
        // 去重实体避免重复渲染
        const seenEntities = new Set();
        entities.forEach((e, idx) => {
          if (seenEntities.has(e.name)) return; // 跳过重复实体
          seenEntities.add(e.name);
          const node = graph.addNode({
            x: 50 + (idx % 4) * 200,
            y: 50 + Math.floor(idx / 4) * 150,
            width: 150,
            height: 80,
            label: e.name,
            attrs: { body: { stroke: '#5F95FF', fill: '#EFF4FF' } },
          });
          nodeMap[e.name.toLowerCase()] = node;
        });
        relations.forEach(rel => {
          const src = nodeMap[rel.source];
          const tgt = nodeMap[rel.target];
          if (src && tgt) {
            graph.addEdge({
              source: src,
              target: tgt,
              labels: [{ attrs: { label: { text: rel.type } } }],
            });
          }
        });

      })
        .catch(err => alert('加载模型失败: ' + err));
    }

  </script>
</body>
</html>
