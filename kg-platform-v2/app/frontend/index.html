<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>KG Platform UI</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        #results {margin-top: 1rem;}
        .result {padding: 0.5rem; border: 1px solid #ccc; margin-bottom: 0.5rem;}
    </style>
    <script>
        async function search() {
            const term = document.getElementById('term').value.trim();
            if (!term) return;
            const resp = await fetch(`/search?q=${encodeURIComponent(term)}`);
            const data = await resp.json();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            if (data.results && data.results.length) {
                data.results.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'result';
                    const name = r.properties && r.properties.name ? r.properties.name : '(no name)';
                    div.textContent = `Name: ${name}, Score: ${r.score}`;
                    resultsDiv.appendChild(div);
                });
            } else {
                resultsDiv.textContent = 'No matches.';
            }
        }
    </script>
</head>
<body>
    <h1>KG Platform Search</h1>
    <nav style="margin-bottom:1rem;">
        <a href="/kg_page">知识图谱列表</a> |
        <a href="/chat">Chat</a> |
        <a href="/datasources_page">数据源管理</a> | 
        <a href="/semantic_page">语义词典</a>
    </nav>
    <!-- 默认打开知识图谱列表 -->
    <div style="display:flex; flex-direction:column; gap:1rem;">
        <iframe src="/kg_page" style="width:100%; height:400px; border:1px solid #ddd;"></iframe>

    </div>
    <input type="text" id="term" placeholder="Enter search term" />
    <button onclick="search()">Search</button>
    <div id="results"></div>
</body>
</html>
